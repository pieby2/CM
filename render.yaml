databases:
  - name: cue-math-db
    databaseName: cue_math
    user: cue
    plan: free

services:
  - type: redis
    name: cue-math-redis
    plan: free

  - type: web
    name: cue-math-api
    env: python
    plan: free
    rootDir: apps/api
    buildCommand: "pip install -r requirements.txt && python -m scripts.migrate"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CUE_DATABASE_URL
        fromDatabase:
          name: cue-math-db
          property: connectionString
      - key: CUE_REDIS_URL
        fromService:
          type: redis
          name: cue-math-redis
          property: connectionString
      - key: CUE_HLR_SERVICE_URL
        value: "https://cue-math-hlr.onrender.com"
      - key: CUE_CORS_ORIGINS_RAW
        value: "*" # You may restrict this later to your static site URL
      - key: CUE_GROQ_API_KEY
        sync: false # You will need to input this manually in the Render Dashboard

  - type: web
    name: cue-math-hlr
    env: python
    plan: free
    rootDir: apps/hlr
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: cue-math-web
    env: node
    plan: free
    rootDir: apps/web
    buildCommand: "npm install && npm run build"
    startCommand: "npx serve -s dist"
    envVars:
      - key: VITE_API_URL
        value: "https://cue-math-api.onrender.com/api"
