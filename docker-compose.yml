version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cue-postgres
    environment:
      POSTGRES_DB: cue_math
      POSTGRES_USER: cue
      POSTGRES_PASSWORD: cue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cue-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
